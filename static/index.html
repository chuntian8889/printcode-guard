<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintCode Guard v1</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>PrintCode Guard <span class="tag">v1 USB 扫描头版</span></h1>
    </header>

    <div class="controls">
      <div>
        <label>扫描头设备路径（留空自动发现）</label>
        <input id="scanner-device" type="text" placeholder="/dev/input/event12" style="width: 260px;">
        <button id="btn-save-scanner">保存</button>
      </div>
      <div>
        <button id="btn-new-order">新建订单</button>
        <button id="btn-import">导入码库</button>
        <input id="file-import" type="file" accept=".csv,.xlsx" hidden>
      </div>
      <div>
        <button id="btn-start">开始检测</button>
        <button id="btn-stop">暂停检测</button>
        <button id="btn-clear-alarm">清除报警</button>
        <button id="btn-test-buzzer">测试蜂鸣器</button>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <span>订单: <b id="order-name">-</b></span>
      <span>状态: <b id="run-state">停止</b></span>
      <span>已读: <b id="total-count">0</b></span>
      <span>重复: <b id="dup-count">0</b></span>
      <span>异常: <b id="err-count">0</b></span>
      <span>当前码: <b id="latest-code">-</b></span>
      <span>扫描头: <b id="scanner-device-display">-</b></span>
      <span>在线: <b id="scanner-online">-</b></span>
      <span>蜂鸣器: <b id="buzzer-backend">-</b></span>
    </div>

    <div class="main">
      <div class="video-panel">
        <div class="scanner-status">
          <h3>扫描头状态</h3>
          <p>设备: <span id="scanner-device-status">-</span></p>
          <p>在线: <span id="scanner-online-status">-</span></p>
          <p>错误: <span id="scanner-error-status">-</span></p>
          <p class="hint">USB 扫描头已连接。开始检测后，扫描到的二维码会显示在右侧记录中。</p>
        </div>
      </div>
      <div class="side-panel">
        <h3>最近扫码记录</h3>
        <ul id="scan-list"></ul>
        <h3>最近报警记录</h3>
        <ul id="alarm-list"></ul>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
